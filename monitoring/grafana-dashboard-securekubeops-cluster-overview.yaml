apiVersion: v1
kind: ConfigMap
metadata:
  name: securekubeops-cluster-overview-dashboard
  namespace: monitoring
  annotations:
    grafana_folder: SecureKubeOps
  labels:
    grafana_dashboard: "1"
    app.kubernetes.io/name: securekubeops-cluster-overview-dashboard
    app.kubernetes.io/part-of: securekubeops
    app.kubernetes.io/component: cluster-observability-dashboard
data:
  securekubeops-cluster-overview-dashboard.json: |-
    {
      "uid": "securekubeops-cluster-overview",
      "title": "SecureKubeOps Cluster Overview",
      "description": "Kubernetes cluster overview for SecureKubeOps using kube-prometheus-stack, kube-state-metrics and node-exporter metrics. The dashboard avoids cloud-provider-specific metrics so it can be reused in Minikube and AKS.",
      "tags": [
        "securekubeops",
        "kubernetes",
        "cluster-observability"
      ],
      "timezone": "browser",
      "schemaVersion": 39,
      "version": 2,
      "refresh": "30s",
      "time": {
        "from": "now-1h",
        "to": "now"
      },
      "templating": {
        "list": [
          {
            "name": "namespace",
            "label": "Namespace",
            "type": "query",
            "datasource": {
              "type": "prometheus",
              "uid": "prometheus"
            },
            "query": "label_values(kube_namespace_status_phase, namespace)",
            "refresh": 1,
            "sort": 1,
            "multi": true,
            "includeAll": true,
            "current": {
              "selected": true,
              "text": "All",
              "value": "$__all"
            }
          }
        ]
      },
      "panels": [
        {
          "id": 1,
          "type": "row",
          "title": "Cluster summary",
          "gridPos": {
            "x": 0,
            "y": 0,
            "w": 24,
            "h": 1
          },
          "collapsed": false,
          "panels": []
        },
        {
          "id": 2,
          "type": "stat",
          "title": "Nodos",
          "description": "N?mero total de nodos detectados mediante kube-state-metrics.",
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "gridPos": {
            "x": 0,
            "y": 1,
            "w": 6,
            "h": 4
          },
          "fieldConfig": {
            "defaults": {
              "color": {
                "mode": "fixed",
                "fixedColor": "blue"
              },
              "mappings": [],
              "unit": "short"
            },
            "overrides": []
          },
          "options": {
            "colorMode": "background",
            "graphMode": "none",
            "justifyMode": "center",
            "orientation": "auto",
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": "",
              "values": false
            },
            "showPercentChange": false,
            "textMode": "auto",
            "wideLayout": true
          },
          "targets": [
            {
              "datasource": {
                "type": "prometheus",
                "uid": "prometheus"
              },
              "editorMode": "code",
              "expr": "count(kube_node_info)",
              "instant": true,
              "legendFormat": "Nodos",
              "range": false,
              "refId": "A",
              "format": "time_series"
            }
          ]
        },
        {
          "id": 3,
          "type": "stat",
          "title": "Nodos Ready",
          "description": "Nodos con condici?n Ready=true.",
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "gridPos": {
            "x": 6,
            "y": 1,
            "w": 6,
            "h": 4
          },
          "fieldConfig": {
            "defaults": {
              "color": {
                "mode": "fixed",
                "fixedColor": "green"
              },
              "mappings": [],
              "unit": "short"
            },
            "overrides": []
          },
          "options": {
            "colorMode": "background",
            "graphMode": "none",
            "justifyMode": "center",
            "orientation": "auto",
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": "",
              "values": false
            },
            "showPercentChange": false,
            "textMode": "auto",
            "wideLayout": true
          },
          "targets": [
            {
              "datasource": {
                "type": "prometheus",
                "uid": "prometheus"
              },
              "editorMode": "code",
              "expr": "sum(kube_node_status_condition{condition=\"Ready\",status=\"true\"})",
              "instant": true,
              "legendFormat": "Nodos Ready",
              "range": false,
              "refId": "A",
              "format": "time_series"
            }
          ]
        },
        {
          "id": 4,
          "type": "stat",
          "title": "Nodos no Ready",
          "description": "Nodos con condici?n Ready=false o Ready=unknown.",
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "gridPos": {
            "x": 12,
            "y": 1,
            "w": 6,
            "h": 4
          },
          "fieldConfig": {
            "defaults": {
              "color": {
                "mode": "fixed",
                "fixedColor": "red"
              },
              "mappings": [],
              "unit": "short"
            },
            "overrides": []
          },
          "options": {
            "colorMode": "background",
            "graphMode": "none",
            "justifyMode": "center",
            "orientation": "auto",
