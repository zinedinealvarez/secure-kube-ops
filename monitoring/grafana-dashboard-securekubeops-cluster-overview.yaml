                },
                "inspect": false
              },
              "mappings": [],
              "noValue": "Sin datos"
            },
            "overrides": []
          },
          "options": {
            "cellHeight": "sm",
            "footer": {
              "countRows": false,
              "fields": "",
              "reducer": [
                "sum"
              ],
              "show": false
            },
            "showHeader": true
          },
          "targets": [
            {
              "datasource": {
                "type": "prometheus",
                "uid": "prometheus"
              },
              "editorMode": "code",
              "expr": "kube_node_status_condition{condition=\"Ready\",status=~\"true|false|unknown\"}",
              "instant": true,
              "legendFormat": "__auto",
              "range": false,
              "refId": "A",
              "format": "table"
            }
          ],
          "transformations": [
            {
              "id": "organize",
              "options": {
                "excludeByName": {
                  "Time": true,
                  "__name__": true,
                  "container": true,
                  "endpoint": true,
                  "instance": true,
                  "job": true,
                  "namespace": true,
                  "pod": true,
                  "service": true,
                  "image": true,
                  "deployment": true
                },
                "indexByName": {
                  "node": 0,
                  "condition": 1,
                  "status": 2,
                  "Value": 3
                },
                "renameByName": {
                  "node": "Nodo",
                  "condition": "Condición",
                  "status": "Estado",
                  "Value": "Valor"
                }
              }
            }
          ]
        },
