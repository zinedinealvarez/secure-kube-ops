              "instant": true,
              "legendFormat": "Nodos no Ready",
              "range": false,
              "refId": "A",
              "format": "time_series"
            }
          ]
        },
        {
          "id": 5,
          "type": "stat",
          "title": "Namespaces activos",
          "description": "Namespaces existentes en fase Active.",
