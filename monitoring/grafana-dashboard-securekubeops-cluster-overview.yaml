              "countRows": false,
              "fields": "",
              "reducer": [
                "sum"
              ],
              "show": false
            },
            "showHeader": true
          },
          "targets": [
            {
              "datasource": {
                "type": "prometheus",
                "uid": "prometheus"
              },
              "editorMode": "code",
              "expr": "kube_node_status_condition{condition=\"Ready\",status=~\"true|false|unknown\"}",
              "instant": true,
              "legendFormat": "__auto",
              "range": false,
