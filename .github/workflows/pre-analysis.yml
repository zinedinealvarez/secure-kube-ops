name: Pre Analysis

on:
  push:
    branches:
      - 'pre-*'

jobs:
  pre-analysis:
    name: Pre Analysis
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Prepare reports directory
        run: mkdir -p reports/tools

      - name: Detect secrets with GitLeaks
        id: gitleaks
        continue-on-error: true
        if: github.actor != 'dependabot[bot]'
        env:
          WORKSPACE: ${{ github.workspace }}
        run: |
          mkdir -p reports/gitleaks-source
          rsync -a --exclude='.git' --exclude='reports' ./ reports/gitleaks-source/
          docker run --rm \
            -v "$WORKSPACE/reports/gitleaks-source:/repo:ro" \
            -v "$WORKSPACE/reports/tools:/reports" \
            ghcr.io/gitleaks/gitleaks:v8.24.2 dir /repo \
            --config /repo/.gitleaks.toml \
            --report-format json \
            --report-path /reports/gitleaks.json \
            --redact \
            --exit-code 1 \
            --no-banner

      - name: Record GitLeaks evidence
        if: always()
        run: |
          if [ -f reports/tools/gitleaks.json ]; then
            GITLEAKS_FINDINGS=$(node -e "const fs=require('fs'); const p='reports/tools/gitleaks.json'; const data=JSON.parse(fs.readFileSync(p,'utf8') || '[]'); console.log(Array.isArray(data) ? data.length : 0);")
          else
            GITLEAKS_FINDINGS=0
          fi

          cat > reports/tools/gitleaks-summary.json <<EOF
          {
            "tool": "GitLeaks",
            "workflow": "${{ github.workflow }}",
            "run_id": "${{ github.run_id }}",
            "commit": "${{ github.sha }}",
            "actor": "${{ github.actor }}",
            "outcome": "${{ steps.gitleaks.outcome }}",
            "findings": ${GITLEAKS_FINDINGS},
            "skipped_for_dependabot": "${{ github.actor == 'dependabot[bot]' }}"
          }
          EOF

      - name: Run Semgrep SAST
        id: semgrep_sast
        if: always()
        continue-on-error: true
        env:
          WORKSPACE: ${{ github.workspace }}
        run: docker run --rm -v "$WORKSPACE:/src" --workdir /src semgrep/semgrep semgrep scan --config auto --config .semgrep.yml . --json-output reports/tools/semgrep.json

      - name: Informational Trivy Kubernetes config scan
        id: trivy_config_scan
        if: always()
        continue-on-error: true
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: config
          scan-ref: k8s/
          format: table
          exit-code: 0

      - name: Generate Trivy Kubernetes config report
        if: always()
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: config
          scan-ref: k8s/
          format: json
          output: reports/tools/trivy-config.json
          exit-code: 0

      - name: Write Pre Analysis metadata and summary
        if: always()
        run: |
          cat > reports/metadata.json <<EOF
          {
            "workflow": "${{ github.workflow }}",
            "run_id": "${{ github.run_id }}",
            "event": "${{ github.event_name }}",
            "branch": "${{ github.ref_name }}",
            "commit": "${{ github.sha }}",
            "artifact_type": "devsecops-evidence",
            "controls": {
              "gitleaks": "${{ steps.gitleaks.outcome }}",
              "semgrep_sast": "${{ steps.semgrep_sast.outcome }}",
              "trivy_config": "${{ steps.trivy_config_scan.outcome }}"
            }
          }
          EOF

          {
            echo "## Pre Analysis evidence"
            echo ""
            echo "| Control | Result | Evidence |"
            echo "| --- | --- | --- |"
            echo "| GitLeaks | ${{ steps.gitleaks.outcome }} | tools/gitleaks-summary.json |"
            echo "| Semgrep SAST | ${{ steps.semgrep_sast.outcome }} | tools/semgrep.json |"
            echo "| Trivy config | ${{ steps.trivy_config_scan.outcome }} | tools/trivy-config.json |"
            echo ""
            echo "Commit: \`${{ github.sha }}\`"
            echo "Branch: \`${{ github.ref_name }}\`"
            echo ""
            echo "Artifact structure: \`metadata.json\`, \`pre-analysis-security-report.html\`, \`tools/\`"
          } > reports/summary.md

          cat reports/summary.md >> "$GITHUB_STEP_SUMMARY"

      - name: Generate Pre Analysis pipeline metrics
        if: always()
        run: |
          METRIC_TIME="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          PIPELINE_RESULT="success"
          if [ "${{ steps.gitleaks.outcome }}" = "failure" ] || [ "${{ steps.semgrep_sast.outcome }}" = "failure" ] || [ "${{ steps.trivy_config_scan.outcome }}" = "failure" ]; then
            PIPELINE_RESULT="failure"
          fi

          cat > reports/metrics.prom <<EOF
          # HELP securekubeops_pipeline_execution_total Pipeline executions grouped for Grafana dashboards.
          # TYPE securekubeops_pipeline_execution_total counter
          securekubeops_pipeline_execution_total{workflow="pre_analysis",event="push",branch_type="pre",result="${PIPELINE_RESULT}",time="${METRIC_TIME}"} 1
          # HELP securekubeops_pipeline_control_total Pipeline control executions grouped by control, category and result.
          # TYPE securekubeops_pipeline_control_total counter
          securekubeops_pipeline_control_total{workflow="pre_analysis",control="gitleaks",category="secret_detection",result="${{ steps.gitleaks.outcome }}",time="${METRIC_TIME}"} 1
          securekubeops_pipeline_control_total{workflow="pre_analysis",control="semgrep_sast",category="sast",result="${{ steps.semgrep_sast.outcome }}",time="${METRIC_TIME}"} 1
          securekubeops_pipeline_control_total{workflow="pre_analysis",control="trivy_config",category="iac_scan",result="${{ steps.trivy_config_scan.outcome }}",time="${METRIC_TIME}"} 1
          # HELP securekubeops_security_finding_info Security findings exported with scanner metadata for Grafana tables.
          # TYPE securekubeops_security_finding_info gauge
          EOF

          METRIC_TIME="${METRIC_TIME}" \
          node <<'NODE'
          const fs = require('fs');
          const output = 'reports/metrics.prom';
          const metricTime = process.env.METRIC_TIME;
          const samples = new Map();

          function append(line) {
            fs.appendFileSync(output, `${line}\n`);
          }

          function escapeLabel(value) {
            return String(value ?? '')
              .replace(/\\/g, '\\\\')
              .replace(/\n/g, ' ')
              .replace(/\r/g, ' ')
              .replace(/"/g, '\\"')
              .trim();
          }

          function first(value) {
            return Array.isArray(value) ? value[0] : value;
          }

          function metric(labels, value = 1) {
            const body = Object.entries(labels)
              .map(([key, val]) => `${key}="${escapeLabel(val)}"`)
              .join(',');
            const key = `securekubeops_security_finding_info{${body}}`;
            samples.set(key, (samples.get(key) || 0) + value);
          }

          function readJson(path) {
            if (!fs.existsSync(path)) return null;
            const raw = fs.readFileSync(path, 'utf8').trim();
            if (!raw) return null;
            return JSON.parse(raw);
          }

          const gitleaks = readJson('reports/tools/gitleaks.json');
          const gitleaksCount = Array.isArray(gitleaks) ? gitleaks.length : 0;
          metric({
            workflow: 'pre_analysis',
            tool: 'gitleaks',
            scan_type: 'secret_detection',
            id: 'gitleaks-secrets-detected',
            severity: 'CRITICAL',
            title: 'Secrets detected',
            description: 'Number of potential secrets detected by GitLeaks without exposing matched values.',
            time: metricTime,
          }, gitleaksCount);

          const trivyConfig = readJson('reports/tools/trivy-config.json');
          for (const result of trivyConfig?.Results || []) {
            for (const item of result.Misconfigurations || []) {
              metric({
                workflow: 'pre_analysis',
                tool: 'trivy',
                scan_type: 'config',
                id: item.ID || item.AVDID || item.MisconfID || 'unknown',
                severity: String(item.Severity || 'UNKNOWN').toUpperCase(),
                title: item.Title || item.Message || item.ID || 'Kubernetes misconfiguration',
                description: item.Description || item.Message || 'Kubernetes configuration finding detected by Trivy.',
                time: metricTime,
              });
            }
          }

          const semgrep = readJson('reports/tools/semgrep.json');
          for (const finding of semgrep?.results || []) {
            const metadata = finding.extra?.metadata || {};
            const vulnerabilityClass = first(metadata.vulnerability_class);
            metric({
              workflow: 'pre_analysis',
              tool: 'semgrep',
              scan_type: 'sast',
              id: finding.check_id || 'unknown',
              severity: String(finding.extra?.severity || 'INFO').toUpperCase(),
              title: vulnerabilityClass || metadata.category || finding.check_id || 'SAST finding',
              description: finding.extra?.message || 'Static analysis finding detected by Semgrep.',
              cwe: first(metadata.cwe) || '',
              owasp: first(metadata.owasp) || '',
              confidence: metadata.confidence || '',
              impact: metadata.impact || '',
              likelihood: metadata.likelihood || '',
              time: metricTime,
            });
          }

          for (const [sample, value] of samples) {
            append(`${sample} ${value}`);
          }
          NODE

      - name: Generate Pre Analysis HTML report
        if: always()
        run: |
          cat > reports/pre-analysis-security-report.html <<EOF
          <!doctype html>
          <html lang="es">
          <head>
            <meta charset="utf-8">
            <title>SecureKubeOps - Pre Analysis evidence</title>
            <style>
              body { font-family: Arial, sans-serif; margin: 2rem; color: #1f2937; }
              h1 { margin-bottom: 0.25rem; }
              .meta { color: #4b5563; margin-bottom: 1.5rem; }
              table { border-collapse: collapse; width: 100%; margin-top: 1rem; }
              th, td { border: 1px solid #d1d5db; padding: 0.65rem; text-align: left; }
              th { background: #f3f4f6; }
              code { background: #f3f4f6; padding: 0.15rem 0.3rem; border-radius: 4px; }
            </style>
          </head>
          <body>
            <h1>SecureKubeOps - Pre Analysis</h1>
            <p class="meta">Resultados del preanálisis de seguridad ejecutado sobre la rama <code>${{ github.ref_name }}</code> para el commit <code>${{ github.sha }}</code>.</p>
            <p>El proceso de preanálisis revisa secretos, código fuente y manifiestos Kubernetes antes de promover los cambios hacia la rama de producción.</p>
            <p>Se han ejecutado los siguientes controles:</p>
            <ul>
              <li><strong>GitLeaks:</strong> detección de secretos, credenciales o patrones sensibles dentro del repositorio.</li>
              <li><strong>Semgrep SAST:</strong> análisis estático del código fuente mediante reglas automáticas y reglas locales versionadas.</li>
              <li><strong>Trivy config:</strong> revisión de los manifiestos Kubernetes ubicados en <code>k8s/</code>.</li>
            </ul>
            <p><strong>Workflow:</strong> ${{ github.workflow }}</p>
            <p><strong>Run ID:</strong> ${{ github.run_id }}</p>
            <p><strong>Commit:</strong> <code>${{ github.sha }}</code></p>
            <p><strong>Branch:</strong> <code>${{ github.ref_name }}</code></p>
            <p>Se han obtenido los siguientes resultados:</p>
            <table>
              <thead>
                <tr><th>Control</th><th>Resultado</th><th>Evidencia</th></tr>
              </thead>
              <tbody>
                <tr><td>GitLeaks</td><td>${{ steps.gitleaks.outcome }}</td><td>tools/gitleaks-summary.json</td></tr>
                <tr><td>Semgrep SAST</td><td>${{ steps.semgrep_sast.outcome }}</td><td>tools/semgrep.json</td></tr>
                <tr><td>Trivy config</td><td>${{ steps.trivy_config_scan.outcome }}</td><td>tools/trivy-config.json</td></tr>
              </tbody>
            </table>
          </body>
          </html>
          EOF

      - name: Upload Pre Analysis reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: securekubeops-pre-analysis-security-results-${{ github.run_id }}-${{ github.sha }}
          path: |
            reports/metadata.json
            reports/metrics.prom
            reports/pre-analysis-security-report.html
            reports/tools/
          retention-days: 90
          if-no-files-found: warn

      - name: Fail Pre Analysis if required controls failed
        if: always()
        run: |
          if [ "${{ steps.gitleaks.outcome }}" = "failure" ] || \
             [ "${{ steps.semgrep_sast.outcome }}" = "failure" ] || \
             [ "${{ steps.trivy_config_scan.outcome }}" = "failure" ]; then
            echo "One or more Pre Analysis controls failed."
            exit 1
          fi
