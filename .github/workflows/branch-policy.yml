name: Branch Policy

on:
  pull_request:
    branches:
      - main

jobs:
  validate-source-branch:
    name: Validate source branch
    runs-on: ubuntu-latest

    steps:
      - name: Prepare reports directory
        run: mkdir -p reports/tools

      - name: Ensure PR to main comes from pre
        id: branch_policy
        run: |
          echo "Base branch: ${{ github.base_ref }}"
          echo "Source branch: ${{ github.head_ref }}"

          if [ "${{ github.head_ref }}" != "pre" ]; then
            echo "Pull Requests to main must come from pre."
            exit 1
          fi

      - name: Record Branch Policy evidence
        if: always()
        run: |
          cat > reports/metadata.json <<EOF
          {
            "workflow": "${{ github.workflow }}",
            "run_id": "${{ github.run_id }}",
            "event": "${{ github.event_name }}",
            "base_branch": "${{ github.base_ref }}",
            "source_branch": "${{ github.head_ref }}",
            "commit": "${{ github.sha }}",
            "artifact_type": "devsecops-evidence",
            "controls": {
              "validate_source_branch": "${{ steps.branch_policy.outcome }}"
            }
          }
          EOF

      - name: Write Branch Policy summary
        if: always()
        run: |
          {
            echo "## Branch Policy evidence"
            echo ""
            echo "| Control | Result | Evidence |"
            echo "| --- | --- | --- |"
            echo "| Validate source branch | ${{ steps.branch_policy.outcome }} | metadata.json |"
            echo ""
            echo "Base branch: \`${{ github.base_ref }}\`"
            echo "Source branch: \`${{ github.head_ref }}\`"
            echo ""
            echo "Artifact structure: \`metadata.json\`, \`summary.md\`, \`tools/\`"
          } > reports/summary.md

          cat reports/summary.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload Branch Policy reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: securekubeops-branch-policy-${{ github.run_id }}-${{ github.sha }}
          path: reports/
          retention-days: 90
          if-no-files-found: warn
