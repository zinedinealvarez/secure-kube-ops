name: Branch Policy

on:
  pull_request:
    branches:
      - main

jobs:
  validate-source-branch:
    name: Validate source branch
    runs-on: ubuntu-latest

    steps:
      - name: Prepare reports directory
        run: mkdir -p reports/tools

      - name: Ensure PR to main comes from an allowed source branch
        id: branch_policy
        continue-on-error: true
        env:
          SOURCE_BRANCH: ${{ github.head_ref }}
          PR_ACTOR: ${{ github.actor }}
        run: |
          echo "Base branch: ${{ github.base_ref }}"
          echo "Source branch: ${SOURCE_BRANCH}"
          echo "Actor: ${PR_ACTOR}"

          if [[ "${SOURCE_BRANCH}" == pre-* ]]; then
            echo "Allowed source branch: regular validation branch."
            exit 0
          fi

          if [[ "${PR_ACTOR}" == "dependabot[bot]" && "${SOURCE_BRANCH}" == dependabot/* ]]; then
            echo "Allowed source branch: Dependabot update branch."
            exit 0
          fi

          echo "Pull Requests to main must come from a branch with the pre- prefix, except Dependabot PRs from dependabot/* branches."
          exit 1

      - name: Record Branch Policy evidence
        if: always()
        run: |
          cat > reports/metadata.json <<EOF
          {
            "workflow": "${{ github.workflow }}",
            "run_id": "${{ github.run_id }}",
            "event": "${{ github.event_name }}",
            "base_branch": "${{ github.base_ref }}",
            "source_branch": "${{ github.head_ref }}",
            "commit": "${{ github.sha }}",
            "artifact_type": "devsecops-evidence",
            "controls": {
              "validate_source_branch": "${{ steps.branch_policy.outcome }}"
            }
          }
          EOF

      - name: Write Branch Policy summary
        if: always()
        run: |
          {
            echo "## Branch Policy evidence"
            echo ""
            echo "| Control | Result | Evidence |"
            echo "| --- | --- | --- |"
            echo "| Validate source branch | ${{ steps.branch_policy.outcome }} | metadata.json |"
            echo ""
            echo "Base branch: \`${{ github.base_ref }}\`"
            echo "Source branch: \`${{ github.head_ref }}\`"
            echo ""
            echo "Artifact structure: \`metadata.json\`, \`branch-policy-report.html\`, \`tools/\`"
          } > reports/summary.md

          cat reports/summary.md >> "$GITHUB_STEP_SUMMARY"

      - name: Generate Branch Policy pipeline metrics
        if: always()
        run: |
          PIPELINE_RESULT="success"
          PROMOTION_RESULT="allowed"
          if [ "${{ steps.branch_policy.outcome }}" = "failure" ]; then
            PIPELINE_RESULT="failure"
            PROMOTION_RESULT="blocked"
          fi

          cat > reports/metrics.prom <<EOF
          # HELP securekubeops_pipeline_execution_total Pipeline executions grouped for Grafana dashboards.
          # TYPE securekubeops_pipeline_execution_total counter
          securekubeops_pipeline_execution_total{workflow="branch_policy",event="pull_request",branch_type="pull_request",result="${PIPELINE_RESULT}",run_id="${{ github.run_id }}"} 1
          # HELP securekubeops_pipeline_control_total Pipeline control executions grouped by control, category and result.
          # TYPE securekubeops_pipeline_control_total counter
          securekubeops_pipeline_control_total{workflow="branch_policy",control="branch_policy",category="branch_policy",result="${{ steps.branch_policy.outcome }}",run_id="${{ github.run_id }}"} 1
          # HELP securekubeops_promotion_total Promotion-related events in the DevSecOps flow.
          # TYPE securekubeops_promotion_total counter
          securekubeops_promotion_total{stage="branch_policy",result="${PROMOTION_RESULT}",run_id="${{ github.run_id }}"} 1
          EOF

      - name: Generate Branch Policy HTML report
        if: always()
        run: |
          cat > reports/branch-policy-report.html <<EOF
          <!doctype html>
          <html lang="es">
          <head>
            <meta charset="utf-8">
            <title>SecureKubeOps - Branch Policy evidence</title>
            <style>
              body { font-family: Arial, sans-serif; margin: 2rem; color: #1f2937; }
              h1 { margin-bottom: 0.25rem; }
              .meta { color: #4b5563; margin-bottom: 1.5rem; }
              table { border-collapse: collapse; width: 100%; margin-top: 1rem; }
              th, td { border: 1px solid #d1d5db; padding: 0.65rem; text-align: left; }
              th { background: #f3f4f6; }
              code { background: #f3f4f6; padding: 0.15rem 0.3rem; border-radius: 4px; }
            </style>
          </head>
          <body>
            <h1>SecureKubeOps - Branch Policy</h1>
            <p class="meta">Resultados de la validación de política de ramas para la Pull Request <code>${{ github.head_ref }} -&gt; ${{ github.base_ref }}</code>.</p>
            <p>El proceso comprueba que toda Pull Request dirigida a <code>main</code> procede de una rama con prefijo <code>pre-</code>, excepto las Pull Requests automaticas de Dependabot desde ramas <code>dependabot/*</code>.</p>
            <p>Se ha ejecutado el siguiente control:</p>
            <ul>
              <li><strong>Validate source branch:</strong> verificacion de que la rama origen de la Pull Request esta permitida por la politica de ramas.</li>
            </ul>
            <p><strong>Workflow:</strong> ${{ github.workflow }}</p>
            <p><strong>Run ID:</strong> ${{ github.run_id }}</p>
            <p><strong>Pull Request:</strong> <code>${{ github.head_ref }} -&gt; ${{ github.base_ref }}</code></p>
            <p>Se han obtenido los siguientes resultados:</p>
            <table>
              <thead>
                <tr><th>Control</th><th>Resultado</th><th>Evidencia</th></tr>
              </thead>
              <tbody>
                <tr><td>Validate source branch</td><td>${{ steps.branch_policy.outcome }}</td><td>metadata.json</td></tr>
              </tbody>
            </table>
          </body>
          </html>
          EOF

      - name: Upload Branch Policy reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: securekubeops-branch-policy-results-${{ github.run_id }}-${{ github.sha }}
          path: |
            reports/metadata.json
            reports/metrics.prom
            reports/branch-policy-report.html
          retention-days: 90
          if-no-files-found: warn

      - name: Fail Branch Policy if source branch is invalid
        if: always()
        run: |
          if [ "${{ steps.branch_policy.outcome }}" = "failure" ]; then
            echo "Branch Policy failed: Pull Requests to main must come from a branch with the pre- prefix, except Dependabot PRs from dependabot/* branches."
            exit 1
          fi

  push-pipeline-metrics:
    name: Push Pipeline Metrics
    needs: validate-source-branch
    if: always()
    runs-on: securekubeops-aks

    steps:
      - name: Download Branch Policy reports
        id: download_reports
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: securekubeops-branch-policy-results-${{ github.run_id }}-${{ github.sha }}
          path: artifact

      - name: Push metrics to internal Pushgateway
        if: hashFiles('artifact/metrics.prom') != ''
        continue-on-error: true
        run: |
          curl --fail --show-error --silent \
            --data-binary @artifact/metrics.prom \
            http://pushgateway.monitoring.svc.cluster.local:9091/metrics/job/securekubeops-branch-policy/instance/${{ github.run_id }}

      - name: Report missing metrics artifact
        if: hashFiles('artifact/metrics.prom') == ''
        run: echo "No metrics.prom artifact found; skipping Pushgateway export."
