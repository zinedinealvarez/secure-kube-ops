name: DevSecOps Pipeline

on:
  push:
  pull_request:

jobs:
  devsecops-checks:
    name: DevSecOps checks
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pull-requests: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Detect secrets with GitLeaks
        if: github.actor != 'dependabot[bot]'
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Run Semgrep SAST
        run: docker run --rm -v "${{ github.workspace }}:/src" --workdir /src semgrep/semgrep semgrep scan --config auto .

      - name: Informational Trivy Kubernetes config scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: config
          scan-ref: k8s/
          format: table
          exit-code: 0

      - name: Build Docker image
        run: docker build -t ghcr.io/zinedinealvarez/secure-kube-ops:${{ github.sha }} .

      - name: Informational Trivy scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: image
          image-ref: ghcr.io/zinedinealvarez/secure-kube-ops:${{ github.sha }}
          scanners: vuln
          format: table
          exit-code: 0
          ignore-unfixed: true
          vuln-type: os,library
          severity: UNKNOWN,LOW,MEDIUM,HIGH,CRITICAL

      # Trivy Security Gate validated during the TFG.
      # It will be re-enabled in the final phase to block images with HIGH or CRITICAL vulnerabilities.
      # In the final secure flow, publishing to GHCR must remain after the active Security Gates.
      # - name: Trivy Security Gate
      #   uses: aquasecurity/trivy-action@v0.36.0
      #   with:
      #     scan-type: image
      #     image-ref: ghcr.io/zinedinealvarez/secure-kube-ops:${{ github.sha }}
      #     scanners: vuln
      #     format: table
      #     exit-code: 1
      #     ignore-unfixed: true
      #     vuln-type: os,library
      #     severity: HIGH,CRITICAL

      - name: Login to GitHub Container Registry
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push Docker image to GHCR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: docker push ghcr.io/zinedinealvarez/secure-kube-ops:${{ github.sha }}
