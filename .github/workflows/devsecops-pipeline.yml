name: DevSecOps Pipeline

on:
  push:
  pull_request:

jobs:
  docker-build:
    name: DevSecOps check
    runs-on: ubuntu-latest

    permissions:
      actions: read
      contents: read
      security-events: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect secrets with GitLeaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: javascript-typescript
          build-mode: none

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4

      - name: Build Docker image
        run: docker build -t secure-cicd-kubernetes:${{ github.sha }} .

      - name: Informational Trivy scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: image
          image-ref: secure-cicd-kubernetes:${{ github.sha }}
          scanners: vuln
          format: table
          exit-code: 0
          ignore-unfixed: true
          vuln-type: os,library
          severity: UNKNOWN,LOW,MEDIUM,HIGH,CRITICAL

      # Trivy Security Gate validated during the TFG.
      # It will be re-enabled in the final phase to block images with HIGH or CRITICAL vulnerabilities.
      # - name: Trivy Security Gate
      #   uses: aquasecurity/trivy-action@v0.36.0
      #   with:
      #     scan-type: image
      #     image-ref: secure-cicd-kubernetes:${{ github.sha }}
      #     scanners: vuln
      #     format: table
      #     exit-code: 1
