name: Image Validation

on:
  pull_request:
    branches:
      - main

jobs:
  image-validation:
    name: Image Validation
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Prepare reports directory
        run: mkdir -p reports/tools

      - name: Build Docker image
        id: docker_build
        run: docker build -t secure-kube-ops:${{ github.sha }} .

      - name: Informational Trivy image scan
        id: trivy_image_scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: image
          image-ref: secure-kube-ops:${{ github.sha }}
          scanners: vuln
          format: table
          exit-code: 0
          ignore-unfixed: true
          vuln-type: os,library
          severity: UNKNOWN,LOW,MEDIUM,HIGH,CRITICAL

      - name: Generate Trivy image report
        if: always() && steps.docker_build.outcome == 'success'
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: image
          image-ref: secure-kube-ops:${{ github.sha }}
          scanners: vuln
          format: json
          output: reports/tools/trivy-image.json
          exit-code: 0
          ignore-unfixed: true
          vuln-type: os,library
          severity: UNKNOWN,LOW,MEDIUM,HIGH,CRITICAL

      - name: Generate image SBOM
        id: trivy_sbom
        if: always() && steps.docker_build.outcome == 'success'
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: image
          image-ref: secure-kube-ops:${{ github.sha }}
          format: cyclonedx
          output: reports/tools/sbom.cyclonedx.json
          exit-code: 0

      - name: Write Image Validation metadata and summary
        if: always()
        run: |
          cat > reports/metadata.json <<EOF
          {
            "workflow": "${{ github.workflow }}",
            "run_id": "${{ github.run_id }}",
            "event": "${{ github.event_name }}",
            "base_branch": "${{ github.base_ref }}",
            "source_branch": "${{ github.head_ref }}",
            "commit": "${{ github.sha }}",
            "image": "secure-kube-ops:${{ github.sha }}",
            "artifact_type": "devsecops-evidence",
            "controls": {
              "docker_build": "${{ steps.docker_build.outcome }}",
              "trivy_image_scan": "${{ steps.trivy_image_scan.outcome }}",
              "trivy_sbom": "${{ steps.trivy_sbom.outcome }}"
            }
          }
          EOF

          {
            echo "## Image Validation evidence"
            echo ""
            echo "| Control | Result | Evidence |"
            echo "| --- | --- | --- |"
            echo "| Docker build | ${{ steps.docker_build.outcome }} | metadata.json |"
            echo "| Trivy image scan | ${{ steps.trivy_image_scan.outcome }} | tools/trivy-image.json |"
            echo "| Trivy SBOM | ${{ steps.trivy_sbom.outcome }} | tools/sbom.cyclonedx.json |"
            echo ""
            echo "Image: \`secure-kube-ops:${{ github.sha }}\`"
            echo "Commit: \`${{ github.sha }}\`"
            echo ""
            echo "Artifact structure: \`metadata.json\`, \`image-validation-security-report.html\`, \`tools/\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Generate Image Validation HTML report
        if: always()
        run: |
          cat > reports/image-validation-security-report.html <<EOF
          <!doctype html>
          <html lang="es">
          <head>
            <meta charset="utf-8">
            <title>SecureKubeOps - Image Validation evidence</title>
            <style>
              body { font-family: Arial, sans-serif; margin: 2rem; color: #1f2937; }
              h1 { margin-bottom: 0.25rem; }
              .meta { color: #4b5563; margin-bottom: 1.5rem; }
              table { border-collapse: collapse; width: 100%; margin-top: 1rem; }
              th, td { border: 1px solid #d1d5db; padding: 0.65rem; text-align: left; }
              th { background: #f3f4f6; }
              code { background: #f3f4f6; padding: 0.15rem 0.3rem; border-radius: 4px; }
            </style>
          </head>
          <body>
            <h1>SecureKubeOps - Image Validation</h1>
            <p class="meta">Resultados de la validación de imagen ejecutada para la Pull Request <code>${{ github.head_ref }} -&gt; ${{ github.base_ref }}</code>.</p>
            <p>El proceso construye la imagen candidata <code>secure-kube-ops:${{ github.sha }}</code>, analiza sus vulnerabilidades y genera el SBOM antes de permitir la entrada del cambio en <code>main</code>.</p>
            <p>Se han ejecutado los siguientes controles:</p>
            <ul>
              <li><strong>Docker build:</strong> construcción de la imagen candidata a partir del Dockerfile del repositorio.</li>
              <li><strong>Trivy image scan:</strong> escaneo informativo de vulnerabilidades del sistema operativo y librerías incluidas en la imagen.</li>
              <li><strong>Trivy SBOM:</strong> generación del inventario CycloneDX de componentes incluidos en la imagen.</li>
            </ul>
            <p><strong>Workflow:</strong> ${{ github.workflow }}</p>
            <p><strong>Run ID:</strong> ${{ github.run_id }}</p>
            <p><strong>Commit:</strong> <code>${{ github.sha }}</code></p>
            <p><strong>Imagen:</strong> <code>secure-kube-ops:${{ github.sha }}</code></p>
            <p><strong>Pull Request:</strong> <code>${{ github.head_ref }} -&gt; ${{ github.base_ref }}</code></p>
            <p>Se han obtenido los siguientes resultados:</p>
            <table>
              <thead>
                <tr><th>Control</th><th>Resultado</th><th>Evidencia</th></tr>
              </thead>
              <tbody>
                <tr><td>Docker build</td><td>${{ steps.docker_build.outcome }}</td><td>metadata.json</td></tr>
                <tr><td>Trivy image scan</td><td>${{ steps.trivy_image_scan.outcome }}</td><td>tools/trivy-image.json</td></tr>
                <tr><td>Trivy SBOM</td><td>${{ steps.trivy_sbom.outcome }}</td><td>tools/sbom.cyclonedx.json</td></tr>
              </tbody>
            </table>
          </body>
          </html>
          EOF

      - name: Upload Image Validation reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: securekubeops-image-validation-security-results-${{ github.run_id }}-${{ github.sha }}
          path: reports/
          retention-days: 90
          if-no-files-found: warn

      # Trivy Security Gate validated during the TFG.
      # It will be re-enabled in the final phase to block images with HIGH or CRITICAL vulnerabilities.
      # - name: Trivy Security Gate
      #   uses: aquasecurity/trivy-action@v0.36.0
      #   with:
      #     scan-type: image
      #     image-ref: secure-kube-ops:${{ github.sha }}
      #     scanners: vuln
      #     format: table
      #     exit-code: 1
      #     ignore-unfixed: true
      #     vuln-type: os,library
      #     severity: HIGH,CRITICAL
