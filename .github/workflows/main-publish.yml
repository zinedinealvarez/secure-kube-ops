name: Publish Image

on:
  push:
    branches:
      - main

jobs:
  publish-image:
    name: Publish Image
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Prepare reports directory
        run: mkdir -p reports/tools

      - name: Build Docker image
        id: docker_build
        continue-on-error: true
        run: docker build -t ghcr.io/zinedinealvarez/secure-kube-ops:${{ github.sha }} .

      - name: Login to GitHub Container Registry
        id: ghcr_login
        if: always() && steps.docker_build.outcome == 'success'
        continue-on-error: true
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push Docker image to GHCR
        id: ghcr_push
        if: always() && steps.docker_build.outcome == 'success' && steps.ghcr_login.outcome == 'success'
        continue-on-error: true
        run: docker push ghcr.io/zinedinealvarez/secure-kube-ops:${{ github.sha }}

      - name: Record published image evidence
        if: always()
        run: |
          cat > reports/metadata.json <<EOF
          {
            "workflow": "${{ github.workflow }}",
            "run_id": "${{ github.run_id }}",
            "event": "${{ github.event_name }}",
            "branch": "${{ github.ref_name }}",
            "commit": "${{ github.sha }}",
            "image": "ghcr.io/zinedinealvarez/secure-kube-ops:${{ github.sha }}",
            "artifact_type": "devsecops-evidence",
            "controls": {
              "docker_build": "${{ steps.docker_build.outcome }}",
              "ghcr_login": "${{ steps.ghcr_login.outcome }}",
              "ghcr_push": "${{ steps.ghcr_push.outcome }}"
            }
          }
          EOF

      - name: Write Publish Image summary
        if: always()
        run: |
          {
            echo "## Publish Image evidence"
            echo ""
            echo "| Control | Result | Evidence |"
            echo "| --- | --- | --- |"
            echo "| Docker build | ${{ steps.docker_build.outcome }} | metadata.json |"
            echo "| GHCR login | ${{ steps.ghcr_login.outcome }} | metadata.json |"
            echo "| GHCR push | ${{ steps.ghcr_push.outcome }} | metadata.json |"
            echo ""
            echo "Image: \`ghcr.io/zinedinealvarez/secure-kube-ops:${{ github.sha }}\`"
            echo "Commit: \`${{ github.sha }}\`"
            echo ""
            echo "Artifact structure: \`metadata.json\`, \`publish-image-report.html\`, \`tools/\`"
          } > reports/summary.md

          cat reports/summary.md >> "$GITHUB_STEP_SUMMARY"

      - name: Generate Publish Image pipeline metrics
        if: always()
        run: |
          PIPELINE_RESULT="success"
          PUBLISH_RESULT="${{ steps.ghcr_push.outcome }}"
          if [ "${{ steps.docker_build.outcome }}" = "failure" ] || [ "${{ steps.ghcr_login.outcome }}" = "failure" ] || [ "${{ steps.ghcr_push.outcome }}" = "failure" ]; then
            PIPELINE_RESULT="failure"
          fi

          cat > reports/metrics.prom <<EOF
          # HELP securekubeops_pipeline_execution_total Pipeline executions grouped for Grafana dashboards.
          # TYPE securekubeops_pipeline_execution_total counter
          securekubeops_pipeline_execution_total{workflow="publish_image",event="push",branch_type="main",result="${PIPELINE_RESULT}",run_id="${{ github.run_id }}"} 1
          # HELP securekubeops_pipeline_control_total Pipeline control executions grouped by control, category and result.
          # TYPE securekubeops_pipeline_control_total counter
          securekubeops_pipeline_control_total{workflow="publish_image",control="docker_build",category="image_build",result="${{ steps.docker_build.outcome }}",run_id="${{ github.run_id }}"} 1
          securekubeops_pipeline_control_total{workflow="publish_image",control="ghcr_login",category="registry_publish",result="${{ steps.ghcr_login.outcome }}",run_id="${{ github.run_id }}"} 1
          securekubeops_pipeline_control_total{workflow="publish_image",control="ghcr_push",category="registry_publish",result="${{ steps.ghcr_push.outcome }}",run_id="${{ github.run_id }}"} 1
          # HELP securekubeops_promotion_total Promotion-related events in the DevSecOps flow.
          # TYPE securekubeops_promotion_total counter
          securekubeops_promotion_total{stage="ghcr_publish",result="${PUBLISH_RESULT}",run_id="${{ github.run_id }}"} 1
          EOF

      - name: Generate Publish Image HTML report
        if: always()
        run: |
          cat > reports/publish-image-report.html <<EOF
          <!doctype html>
          <html lang="es">
          <head>
            <meta charset="utf-8">
            <title>SecureKubeOps - Publish Image evidence</title>
            <style>
              body { font-family: Arial, sans-serif; margin: 2rem; color: #1f2937; }
              h1 { margin-bottom: 0.25rem; }
              .meta { color: #4b5563; margin-bottom: 1.5rem; }
              table { border-collapse: collapse; width: 100%; margin-top: 1rem; }
              th, td { border: 1px solid #d1d5db; padding: 0.65rem; text-align: left; }
              th { background: #f3f4f6; }
              code { background: #f3f4f6; padding: 0.15rem 0.3rem; border-radius: 4px; }
            </style>
          </head>
          <body>
            <h1>SecureKubeOps - Publish Image</h1>
            <p class="meta">Resultados del proceso de publicación ejecutado desde <code>main</code> para el commit <code>${{ github.sha }}</code>.</p>
            <p>El proceso construye la imagen final y la publica en GitHub Container Registry con una etiqueta basada en el SHA del commit.</p>
            <p>Se han ejecutado los siguientes controles:</p>
            <ul>
              <li><strong>Docker build:</strong> construcción de la imagen final desde el código fusionado en <code>main</code>.</li>
              <li><strong>GHCR login:</strong> autenticación contra GitHub Container Registry mediante <code>GITHUB_TOKEN</code>.</li>
              <li><strong>GHCR push:</strong> publicación de la imagen versionada con el SHA del commit.</li>
            </ul>
            <p><strong>Workflow:</strong> ${{ github.workflow }}</p>
            <p><strong>Run ID:</strong> ${{ github.run_id }}</p>
            <p><strong>Commit:</strong> <code>${{ github.sha }}</code></p>
            <p><strong>Imagen:</strong> <code>ghcr.io/zinedinealvarez/secure-kube-ops:${{ github.sha }}</code></p>
            <p>Se han obtenido los siguientes resultados:</p>
            <table>
              <thead>
                <tr><th>Control</th><th>Resultado</th><th>Evidencia</th></tr>
              </thead>
              <tbody>
                <tr><td>Docker build</td><td>${{ steps.docker_build.outcome }}</td><td>metadata.json</td></tr>
                <tr><td>GHCR login</td><td>${{ steps.ghcr_login.outcome }}</td><td>metadata.json</td></tr>
                <tr><td>GHCR push</td><td>${{ steps.ghcr_push.outcome }}</td><td>metadata.json</td></tr>
              </tbody>
            </table>
          </body>
          </html>
          EOF

      - name: Upload Publish Image reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: securekubeops-ghcr-publish-results-${{ github.run_id }}-${{ github.sha }}
          path: |
            reports/metadata.json
            reports/metrics.prom
            reports/publish-image-report.html
          retention-days: 90
          if-no-files-found: warn

      - name: Fail Publish Image if required controls failed
        if: always()
        run: |
          if [ "${{ steps.docker_build.outcome }}" = "failure" ] || \
             [ "${{ steps.ghcr_login.outcome }}" = "failure" ] || \
             [ "${{ steps.ghcr_push.outcome }}" = "failure" ]; then
            echo "Publish Image failed before completing all required publication steps."
            exit 1
          fi

  push-pipeline-metrics:
    name: Push Pipeline Metrics
    needs: publish-image
    if: always()
    runs-on: securekubeops-aks

    steps:
      - name: Download Publish Image reports
        id: download_reports
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: securekubeops-ghcr-publish-results-${{ github.run_id }}-${{ github.sha }}
          path: artifact

      - name: Push metrics to internal Pushgateway
        if: hashFiles('artifact/metrics.prom') != ''
        continue-on-error: true
        run: |
          curl --fail --show-error --silent \
            --data-binary @artifact/metrics.prom \
            http://pushgateway.monitoring.svc.cluster.local:9091/metrics/job/securekubeops-publish-image

      - name: Report missing metrics artifact
        if: hashFiles('artifact/metrics.prom') == ''
        run: echo "No metrics.prom artifact found; skipping Pushgateway export."
