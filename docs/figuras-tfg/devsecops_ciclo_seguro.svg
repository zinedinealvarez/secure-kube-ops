<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1100" viewBox="0 0 1600 1100" role="img" aria-labelledby="title desc">
  <title id="title">Ciclo DevSecOps seguro aplicado a SecureKubeOps</title>
  <desc id="desc">Figura académica original que representa DevSecOps como ciclo continuo entre DEV y OPS, con seguridad integrada durante todo el ciclo de vida del software.</desc>
  <defs>
    <style>
      .bg { fill: #ffffff; }
      .dev-zone { fill: #eaf4fb; stroke: #9cc7df; stroke-width: 2; }
      .ops-zone { fill: #eef7f0; stroke: #a9cfad; stroke-width: 2; }
      .ring { fill: none; stroke: #d8e2ea; stroke-width: 72; stroke-linecap: round; }
      .arrow { fill: none; stroke: #7d96a7; stroke-width: 8; stroke-linecap: round; stroke-linejoin: round; marker-end: url(#arrowHead); }
      .phase-dev { fill: #f7fbfe; stroke: #6ea9c9; stroke-width: 2.5; }
      .phase-ops { fill: #f8fcf8; stroke: #79b27e; stroke-width: 2.5; }
      .support { fill: #fffaf0; stroke: #d7b96f; stroke-width: 2; }
      .center { fill: #ffffff; stroke: #6f8797; stroke-width: 3; }
      .center-band { fill: #f2f6f8; }
      .title { font-family: Arial, Helvetica, sans-serif; font-size: 54px; font-weight: 700; fill: #243946; }
      .subtitle { font-family: Arial, Helvetica, sans-serif; font-size: 29px; fill: #4e6572; }
      .zone-label { font-family: Arial, Helvetica, sans-serif; font-size: 40px; font-weight: 700; letter-spacing: 3px; fill: #35515f; }
      .phase-text { font-family: Arial, Helvetica, sans-serif; font-size: 25px; font-weight: 700; fill: #253b48; text-anchor: middle; dominant-baseline: middle; }
      .support-text { font-family: Arial, Helvetica, sans-serif; font-size: 23px; fill: #4c4230; text-anchor: middle; dominant-baseline: middle; }
      .footer { font-family: Arial, Helvetica, sans-serif; font-size: 25px; fill: #4e6572; text-anchor: middle; }
    </style>
    <marker id="arrowHead" viewBox="0 0 14 14" refX="12" refY="7" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 1 1 L 13 7 L 1 13 z" fill="#7d96a7"/>
    </marker>
  </defs>

  <rect class="bg" width="1600" height="1100"/>
  <path class="dev-zone" d="M 170 170 C 255 70 520 40 760 90 L 760 1010 C 505 1060 255 1025 170 930 Z"/>
  <path class="ops-zone" d="M 840 90 C 1080 40 1345 70 1430 170 L 1430 930 C 1345 1025 1095 1060 840 1010 Z"/>
  <text class="zone-label" x="360" y="145">DEV</text>
  <text class="zone-label" x="1225" y="145">OPS</text>

  <circle class="ring" cx="800" cy="560" r="350"/>
  <path class="arrow" d="M 800 210 C 1010 210 1170 360 1170 560 C 1170 760 1010 910 800 910"/>
  <path class="arrow" d="M 800 910 C 590 910 430 760 430 560 C 430 360 590 210 800 210"/>

  <circle class="center" cx="800" cy="560" r="204"/>
  <path class="center-band" d="M 612 482 C 676 432 924 432 988 482 L 988 646 C 924 696 676 696 612 646 Z"/>
  <text class="title" x="800" y="530" text-anchor="middle">DevSecOps</text>
  <text class="subtitle" x="800" y="584" text-anchor="middle">Seguridad integrada</text>
  <text class="subtitle" x="800" y="622" text-anchor="middle">durante todo el ciclo</text>
  <text class="subtitle" x="800" y="660" text-anchor="middle">de vida del software</text>

  <g>
    <rect class="phase-dev" x="662" y="122" width="276" height="76" rx="18"/>
    <text class="phase-text" x="800" y="160">Planificación</text>

    <rect class="phase-dev" x="398" y="226" width="226" height="72" rx="18"/>
    <text class="phase-text" x="511" y="262">Diseño</text>

    <rect class="phase-dev" x="267" y="450" width="258" height="76" rx="18"/>
    <text class="phase-text" x="396" y="488">Implementación</text>

    <rect class="phase-dev" x="372" y="704" width="222" height="72" rx="18"/>
    <text class="phase-text" x="483" y="740">Pruebas</text>

    <rect class="phase-ops" x="650" y="902" width="300" height="76" rx="18"/>
    <text class="phase-text" x="800" y="940">Despliegue</text>

    <rect class="phase-ops" x="1004" y="704" width="230" height="72" rx="18"/>
    <text class="phase-text" x="1119" y="740">Operación</text>

    <rect class="phase-ops" x="1068" y="450" width="282" height="76" rx="18"/>
    <text class="phase-text" x="1209" y="488">Monitorización</text>

    <rect class="phase-ops" x="974" y="226" width="230" height="72" rx="18"/>
    <text class="phase-text" x="1089" y="262">Respuesta</text>

    <rect class="phase-ops" x="950" y="826" width="294" height="70" rx="18"/>
    <text class="phase-text" x="1097" y="861">Mantenimiento</text>
  </g>

  <g>
    <rect class="support" x="514" y="316" width="292" height="58" rx="25"/>
    <text class="support-text" x="660" y="348">Identificación de riesgos</text>

    <rect class="support" x="210" y="584" width="256" height="58" rx="25"/>
    <text class="support-text" x="338" y="610">Revisión de código</text>

    <rect class="support" x="456" y="780" width="330" height="58" rx="25"/>
    <text class="support-text" x="621" y="809">Validación de dependencias</text>

    <rect class="support" x="846" y="780" width="260" height="58" rx="25"/>
    <text class="support-text" x="976" y="809">Escaneo de imágenes</text>

    <rect class="support" x="1092" y="584" width="274" height="58" rx="25"/>
    <text class="support-text" x="1229" y="610">Configuración segura</text>

    <rect class="support" x="862" y="316" width="322" height="58" rx="25"/>
    <text class="support-text" x="1023" y="348">Supervisión y detección</text>

    <rect class="support" x="664" y="704" width="272" height="58" rx="25"/>
    <text class="support-text" x="800" y="733">Mejora continua</text>
  </g>

  <text class="footer" x="800" y="1030">Controles de seguridad, despliegue y observabilidad integrados en SecureKubeOps</text>
</svg>
