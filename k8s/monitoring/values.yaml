alertmanager:
  enabled: false

grafana:
  enabled: true
  admin:
    existingSecret: monitoring-grafana-admin
    userKey: admin-user
    passwordKey: admin-password
  persistence:
    enabled: true
    size: 1Gi
  initChownData:
    enabled: false
  sidecar:
    dashboards:
      folderAnnotation: grafana_folder
      annotations:
        grafana_folder: Kubernetes
      provider:
        folder: default
        foldersFromFilesStructure: true

prometheus:
  enabled: true
  prometheusSpec:
    retention: 7d
    storageSpec:
      volumeClaimTemplate:
        spec:
          resources:
            requests:
              storage: 5Gi

prometheusOperator:
  enabled: true

kubeStateMetrics:
  enabled: true

nodeExporter:
  enabled: true
